<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prompt Engineering Mastery — 20 Lessons</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;scroll-behavior:smooth}
    body{background:#060810;color:#e8e4d9;font-family:'Syne',sans-serif}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#0a0c14}
    ::-webkit-scrollbar-thumb{background:#2a2d45;border-radius:2px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .4s ease forwards}
    pre{white-space:pre-wrap;word-break:break-word;font-family:'JetBrains Mono',monospace}

    /* HOME */
    .header{background:linear-gradient(160deg,#0d0f20 0%,#080a18 60%,#060810 100%);border-bottom:1px solid #1a1d30;padding:40px 20px 32px}
    .header-inner{max-width:900px;margin:0 auto}
    .tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:#ff6b35;letter-spacing:4px;margin-bottom:10px}
    h1{font-size:38px;font-weight:800;color:#f0ece0;line-height:1.05;margin-bottom:8px}
    .gradient-text{background:linear-gradient(90deg,#ff6b35,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{color:#6a708a;font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:24px}
    .progress-bar-wrap{display:flex;align-items:center;gap:12px}
    .progress-track{flex:1;height:6px;background:#1a1d30;border-radius:3px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#ff6b35,#7c3aed);border-radius:3px;transition:width .5s ease}
    .progress-label{font-family:'JetBrains Mono',monospace;font-size:12px;color:#ff6b35;min-width:50px}

    .main{max-width:900px;margin:0 auto;padding:28px 20px 60px}
    .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
    .filter-btn{padding:7px 14px;border-radius:20px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;transition:all .2s;background:transparent}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
    .card{background:#0a0c18;border:1px solid #1a1d2e;border-radius:12px;padding:20px 18px;cursor:pointer;transition:all .2s;position:relative;animation:fadeUp .3s ease both}
    .card:hover{transform:translateY(-2px)}
    .card-cat{display:flex;align-items:center;gap:6px;margin-bottom:10px}
    .card-cat-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px}
    .card-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:#3a3d55;margin-bottom:6px}
    .card h3{font-size:15px;font-weight:700;color:#e0dcd0;margin-bottom:6px;line-height:1.3}
    .card p{font-size:12px;color:#5a6080;font-style:italic;line-height:1.5}
    .done-badge{position:absolute;top:12px;right:12px;width:20px;height:20px;border-radius:50%;background:#10b981;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}

    /* LESSON */
    .lesson-topbar{background:#0a0c18;border-bottom:1px solid #1a1d30;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .topbar-btn{background:transparent;border:1px solid #2a2d45;color:#a0a8c0;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px}
    .topbar-cat{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px}
    .done-btn{border:1px solid #2a2d45;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;transition:all .2s}

    .lesson-body{max-width:800px;margin:0 auto;padding:32px 20px 80px}
    .lesson-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:#4a4d6a;margin-bottom:8px}
    .lesson-title{font-size:32px;font-weight:800;color:#f0ece0;line-height:1.1;margin-bottom:10px}
    .lesson-tagline{font-size:16px;color:#7a80a0;font-style:italic;margin-bottom:32px}

    .prompt-label{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .prompt-icon{font-size:18px}
    .prompt-tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px}
    .prompt-box{border-radius:10px;padding:18px 20px;margin-bottom:16px}
    .prompt-box pre{font-size:13px;line-height:1.7}
    .weak-box{background:#120808;border:1px solid #3a1515}
    .weak-box pre{color:#c08080}
    .strong-box{background:#081408;border:1px solid #15401a}
    .strong-box pre{color:#90d4a0}

    .reveal-btn{width:100%;border-radius:10px;padding:16px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:16px;transition:all .2s;background:linear-gradient(135deg,#1a1f3a,#0f1525)}
    .why-btn{background:transparent;border:1px solid #2a2d45;color:#7a80a0;padding:10px 20px;border-radius:8px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:20px}

    .why-box{border-radius:10px;padding:20px;margin-bottom:16px}
    .why-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;margin-bottom:10px}
    .why-text{color:#c0c8e0;line-height:1.8;margin-bottom:16px;font-size:14px}
    .rules-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:#4a4d6a;letter-spacing:3px;margin-bottom:10px}
    .rules-list{display:flex;flex-direction:column;gap:8px}
    .rule-item{display:flex;gap:10px;align-items:flex-start}
    .rule-num{font-family:'JetBrains Mono',monospace;font-size:12px;margin-top:2px}
    .rule-text{color:#a0a8c0;font-size:13px;line-height:1.6}

    .example-box{background:#0a0c1a;border:1px solid #1e2035;border-radius:10px;padding:20px;margin-bottom:28px}
    .example-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:#4a4d6a;letter-spacing:3px;margin-bottom:12px}
    .example-box pre{font-size:12px;color:#7a8090;line-height:1.8}

    .nav-btns{display:flex;justify-content:space-between;gap:12px;margin-top:8px}
    .nav-btn{flex:1;padding:12px;border-radius:8px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;transition:all .2s}
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const CATEGORIES = [
  { id:"basics",   label:"Foundations",    color:"#ff6b35", icon:"◈" },
  { id:"system",   label:"System Prompts", color:"#7c3aed", icon:"⬡" },
  { id:"temp",     label:"Creativity",     color:"#0ea5e9", icon:"◎" },
  { id:"chain",    label:"Chaining",       color:"#10b981", icon:"⬢" },
  { id:"coding",   label:"AI for Coding",  color:"#f59e0b", icon:"◆" },
  { id:"image",    label:"Image Prompts",  color:"#ec4899", icon:"◉" },
  { id:"business", label:"Business",       color:"#14b8a6", icon:"◇" },
  { id:"web",      label:"Web Dev",        color:"#8b5cf6", icon:"▣" },
];

const LESSONS = [
  {id:1,cat:"basics",title:"Be Specific & Clear",tagline:"Precision is the first superpower.",
   weak:"Write something about dogs.",
   strong:"Write a 3-sentence description of a golden retriever puppy playing fetch in a park, for a pet adoption website aimed at families with children.",
   why:"The strong prompt locks in: subject detail, format (3 sentences), and audience (families with children). Every word removes ambiguity.",
   rules:["State the exact subject and setting","Set the format and length","Define who will read it"],
   example:"❌  \"Write about climate change.\"\n✅  \"Write a 150-word explainer on rising sea levels for a 10-year-old, using one real-world analogy.\""
  },
  {id:2,cat:"basics",title:"Assign a Role",tagline:"Who the AI 'is' shapes everything it says.",
   weak:"Explain compound interest.",
   strong:"You are a friendly high-school economics teacher. Explain compound interest to a 16-year-old using a simple savings account example. Keep it under 120 words.",
   why:"Role + audience + constraint is a powerful trio. The role sets vocabulary and tone, audience calibrates complexity, and the word limit forces clarity.",
   rules:["Start with 'You are a [role]...'","Match the role to the reader","Add a word or tone constraint"],
   example:"❌  \"Explain machine learning.\"\n✅  \"You are a senior ML engineer. Explain overfitting to a junior developer in 3 bullet points with one code analogy.\""
  },
  {id:3,cat:"basics",title:"Few-Shot Examples",tagline:"Show, don't just tell.",
   weak:"Convert these sentences to formal English.",
   strong:"Convert these sentences to formal English.\n\nExample:\nInput: \"Gonna grab coffee, wanna come?\"\nOutput: \"I am going to get coffee. Would you like to join me?\"\n\nNow convert: \"Hey, can u fix this ASAP pls?\"",
   why:"One well-chosen example teaches tone, structure, and style simultaneously. The model learns your transformation pattern instantly.",
   rules:["Use 1–3 input/output examples","Keep examples consistent in style","Place examples before the actual task"],
   example:"❌  \"Label these tweets as positive or negative.\"\n✅  \"Label sentiment.\nInput: 'Love this!' → Output: Positive\nInput: 'Worst ever.' → Output: Negative\nNow label: 'It was okay I guess.'\""
  },
  {id:4,cat:"basics",title:"Chain of Thought",tagline:"Make the AI show its work.",
   weak:"What's 15% tip on a $47 dinner?",
   strong:"What's 15% tip on a $47 dinner? Think through this step by step before giving the final answer.",
   why:"Adding 'think step by step' forces the model to reason sequentially, dramatically reducing errors on math, logic, and multi-step tasks.",
   rules:["Add 'think step by step'","Ask for reasoning before the answer","Use for math, logic, and planning"],
   example:"❌  \"Should I use REST or GraphQL?\"\n✅  \"Should I use REST or GraphQL for my app? Consider: 2 devs, mobile clients, complex data. Think through trade-offs step by step, then recommend.\""
  },
  {id:5,cat:"system",title:"What Is a System Prompt?",tagline:"The invisible instruction layer that shapes every reply.",
   weak:"(No system prompt — just ask questions directly)",
   strong:"SYSTEM: You are Aria, a concise technical support agent. Always respond in plain English. Never use jargon. If you don't know something, say 'I'll need to check on that.' Keep replies under 80 words.\n\nUSER: My dashboard isn't loading.",
   why:"A system prompt is sent before any user message. It defines the AI's persona, rules, tone, and constraints for the entire conversation.",
   rules:["Set persona, tone, and limits in the system prompt","Rules in system prompt override user requests","Use it to prevent off-topic responses"],
   example:"SYSTEM: You are a recipe assistant. Only discuss food and cooking. If asked about anything else, politely redirect to recipes.\n\nUSER: What's the best Python framework?\nAI: That's outside my expertise! Can I help with a recipe instead?"
  },
  {id:6,cat:"system",title:"System Prompt Patterns",tagline:"Four templates that cover 90% of use cases.",
   weak:"Just describe what you want in each message.",
   strong:"Pattern 1 — Customer Support:\n\"You are [Brand] support. Be empathetic, concise, solution-focused.\"\n\nPattern 2 — Content Writer:\n\"You write SEO blog posts. Always include: hook, 3 sections, CTA.\"\n\nPattern 3 — Code Reviewer:\n\"Review for: security, performance, readability. Output numbered issues + fixes.\"\n\nPattern 4 — Tutor:\n\"You are a Socratic tutor. Never give answers. Ask guiding questions instead.\"",
   why:"Each pattern pre-wires the AI's behavior so every user message gets a consistent, role-appropriate response without repeating instructions every time.",
   rules:["Define the persona in one sentence","List 2–4 behavioral rules","Specify the output format"],
   example:"SYSTEM: You are a hiring assistant. Extract from resumes: name, skills, years of experience. Output as JSON only. No commentary."
  },
  {id:7,cat:"temp",title:"Understanding Temperature",tagline:"The dial between predictable and creative.",
   weak:"Just run the prompt and hope for the best.",
   strong:"Low temp (0.1–0.3) → Factual, consistent\n\"Summarize this legal clause.\" → Use low temp\n\nMedium temp (0.5–0.7) → Balanced\n\"Write a product description.\" → Use medium\n\nHigh temp (0.8–1.0) → Creative, surprising\n\"Write 5 wildly different taglines.\" → Use high temp",
   why:"Temperature controls randomness. Low = the model picks the most probable word (safe). High = it samples from a wider pool, producing unexpected ideas.",
   rules:["Facts/code/data → low temperature","Creative/brainstorm → high temperature","Default 0.7 works for most tasks"],
   example:"Low temp: \"List the 5 most common JavaScript errors with one-line fixes.\"\n\nHigh temp: \"Invent 3 fictional startup names for a company that delivers hot soup by drone.\""
  },
  {id:8,cat:"temp",title:"Prompting for Creativity",tagline:"Unlock unexpected ideas with the right constraints.",
   weak:"Give me some creative ideas for my app.",
   strong:"Generate 5 unconventional app name ideas for a meditation app targeting Gen Z.\nRules:\n- Must feel edgy, not corporate\n- Max 2 words each\n- One can be a made-up word\n- Avoid: calm, zen, peace, breathe",
   why:"Paradoxically, creative prompts work better with constraints. 'Avoid:' eliminates clichés. Specifying count and style prevents generic outputs.",
   rules:["Set a count (5 ideas, 3 options)","Define the style or vibe","Use 'avoid:' to block clichés"],
   example:"❌  \"Give me tagline ideas.\"\n✅  \"Write 6 taglines for a coffee brand. Tone: witty, self-aware. Avoid: 'wake up', 'morning', 'energy'. Each under 8 words.\""
  },
  {id:9,cat:"chain",title:"What Is Prompt Chaining?",tagline:"Break complex tasks into a relay race of prompts.",
   weak:"Write a complete blog post with research, outline, and SEO optimization.",
   strong:"Step 1 — Research:\n\"List 5 major AI trends in 2024 with one key stat each.\"\n\nStep 2 — Outline:\n\"Using these trends: [paste Step 1], create a blog post outline with intro, 5 sections, conclusion.\"\n\nStep 3 — Write:\n\"Write the introduction based on this outline: [paste Step 2]. 150 words, hook with a surprising stat.\"\n\nStep 4 — SEO:\n\"Suggest 5 SEO keywords and a meta description for: [paste draft]\"",
   why:"One giant prompt produces mediocre results. Chaining breaks the task into focused steps — each prompt does one job well, and output feeds the next prompt.",
   rules:["One job per prompt","Pass output as input to the next step","Review at each step before continuing"],
   example:"Chain for a cold email:\n1. Research → \"What pain points do CTOs at startups have?\"\n2. Draft → \"Write a cold email addressing: [pain points]\"\n3. Refine → \"Make this 30% shorter and add a specific CTA\""
  },
  {id:10,cat:"chain",title:"The Refinement Loop",tagline:"Your first prompt is just a draft.",
   weak:"Send the same prompt again hoping for a better result.",
   strong:"Round 1: \"Summarize this article.\"\n→ Problem: too long, 400 words\n\nRound 2: \"Summarize this article in exactly 3 sentences.\"\n→ Problem: misses the key conclusion\n\nRound 3: \"Summarize this article in 3 sentences. The last sentence must state the author's main conclusion.\"\n→ ✅ Perfect\n\nMethod: What's wrong? → What constraint fixes it? → Add it.",
   why:"Each refinement adds exactly one missing constraint. Don't rewrite the whole prompt — diagnose the specific gap and patch it.",
   rules:["Change one thing at a time","Diagnose before refining","Save prompts that work — build a library"],
   example:"v1: \"Write a Python function to sort a list.\"\nv2: \"...sort a list of dicts by a given key. Include a docstring.\"\nv3: \"...Handle missing key. Raise a clear ValueError.\""
  },
  {id:11,cat:"coding",title:"Prompting for Code Generation",tagline:"Treat the AI like a senior dev pair programming with you.",
   weak:"Write a login function.",
   strong:"Write a Python function called authenticate_user that:\n- Takes email (str) and password (str)\n- Hashes the password using bcrypt\n- Queries a SQLite database (users table: id, email, password_hash)\n- Returns the user dict on success, raises AuthError on failure\n- Include type hints and a docstring\n- Use parameterized queries only (no raw SQL strings)",
   why:"Code prompts need: function name, input/output types, libraries, security requirements, and error handling. Each missing detail introduces a bug.",
   rules:["Name the function and its parameters","Specify the library or framework","Include error handling requirements"],
   example:"❌  \"Write a function to fetch data from an API.\"\n✅  \"Write an async Python function fetch_user(user_id: int) using httpx. Hit GET /users/{id}. Return parsed JSON. Raise HTTPError on non-200. Include 3-attempt retry logic.\""
  },
  {id:12,cat:"coding",title:"Code Review & Debugging",tagline:"Get surgical feedback, not vague suggestions.",
   weak:"Review my code.",
   strong:"Review this JavaScript function for:\n1. Security vulnerabilities (XSS, injection)\n2. Performance issues (re-renders, memory leaks)\n3. Readability (naming, complexity)\n\nFor each issue:\n- Quote the exact line\n- Explain why it's a problem\n- Show the fixed version\n\n[paste code here]",
   why:"Specifying review dimensions prevents generic feedback. Asking for exact line quotes + fix forces actionable output, not just observations.",
   rules:["Name the specific review dimensions","Ask for 'quote line + fix' format","Specify language and framework"],
   example:"\"Debug this React useEffect — it causes infinite re-renders.\nExpected: fetch user data once on mount.\nActual: fetches on every render.\n[paste code]\nExplain the root cause, then show the fix.\""
  },
  {id:13,cat:"coding",title:"Tests & Documentation",tagline:"Save hours with AI-generated tests and docs.",
   weak:"Write tests for my code.",
   strong:"Write Jest unit tests for this function:\n[paste function]\n\nRequirements:\n- Test: happy path (valid input)\n- Test: edge case (empty array input)\n- Test: error case (null input → should throw TypeError)\n- Use describe/it blocks with descriptive names\n- Mock any external dependencies\n- Comment explaining what each test verifies",
   why:"Tests need explicit coverage of happy path, edge cases, and error cases. Without specifying these, the AI writes only one basic test.",
   rules:["Specify happy path + edge case + error case","Name the testing framework","Ask for descriptive test names"],
   example:"\"Write JSDoc comments for this function. Include: @param types, @returns, @throws, and one @example showing a real use case.\""
  },
  {id:14,cat:"image",title:"Text-to-Image Basics",tagline:"Images are built from layers of description.",
   weak:"A cat in a forest.",
   strong:"A majestic white cat with amber eyes sitting on a mossy log in a misty ancient forest, golden hour light filtering through tall cedar trees, photorealistic, 8K, shallow depth of field, National Geographic style",
   why:"Image prompts stack layers: Subject → Setting → Lighting → Style → Quality modifiers. Each layer adds visual specificity the AI can't guess.",
   rules:["Subject + Setting + Lighting + Style","Add quality words: photorealistic, 8K, cinematic","Name a visual style or reference"],
   example:"❌  \"A futuristic city\"\n✅  \"A neon-lit cyberpunk city at night, rain-slicked streets reflecting pink and blue signs, flying cars in distance, street level view, Blade Runner aesthetic, ultra-detailed, cinematic\""
  },
  {id:15,cat:"image",title:"Advanced Image Techniques",tagline:"Control composition, mood, and medium.",
   weak:"A portrait of a woman.",
   strong:"Subject: A 30-year-old South Asian woman with short hair\nExpression: thoughtful, slight smile\nLighting: soft Rembrandt lighting from the left\nBackground: blurred warm-toned studio\nMedium: oil painting, John Singer Sargent style\nAspect ratio: portrait 2:3\nNegative prompt: cartoon, anime, distorted hands, watermark",
   why:"Advanced prompts add: lighting type, medium/style reference, aspect ratio, and negative prompts. Negative prompts are as powerful as positive ones.",
   rules:["Specify lighting type (Rembrandt, golden hour, neon)","Name the medium (oil painting, watercolor, photo)","Use negative prompts to exclude unwanted elements"],
   example:"Always include in negatives:\n\"blurry, low quality, watermark, text, extra fingers, distorted face\"\n\nStyle shortcuts:\n\"Wes Anderson style\" → symmetrical, pastel, quirky\n\"Kodak Portra 400\" → film grain, warm tones"
  },
  {id:16,cat:"business",title:"Business Writing Prompts",tagline:"Tone, audience, and purpose are everything.",
   weak:"Write an email about the project delay.",
   strong:"Write a professional email to a client (enterprise CTO) about a 2-week delay.\n\nTone: Transparent but confident\nStructure:\n1. Acknowledge the delay directly (no excuses)\n2. Reason in one sentence (auth module technical debt)\n3. New timeline (March 15)\n4. Two things we're doing to prevent future delays\n5. Proactive offer (call this week)\n\nLength: Under 200 words. No corporate jargon.",
   why:"Business writing prompts need: recipient context, tone, exact structure, and length. The numbered structure removes all ambiguity about content.",
   rules:["Define recipient and their role","Specify tone (transparent, urgent, empathetic)","Give the exact structure as a numbered list"],
   example:"\"Write a LinkedIn post announcing our Series A ($5M). Audience: potential hires. Tone: excited but humble. Include: what we build, team size, use of funds. End with job link CTA. Under 150 words.\""
  },
  {id:17,cat:"business",title:"Strategy & Analysis Prompts",tagline:"Use AI as a thinking partner, not just a writer.",
   weak:"Should we expand to the European market?",
   strong:"Act as a business strategy consultant. Analyze whether our B2B SaaS (50 employees, $2M ARR, HR software) should expand to Europe.\n\nFramework: SWOT analysis\nConsider: GDPR costs, currency risk, timezone gaps, EU competitors (Personio, Factorial)\n\nOutput:\n- SWOT table (2 points per quadrant)\n- Top 3 risks\n- Recommendation with confidence level\n- One alternative to full expansion",
   why:"Strategy prompts work best with a framework (SWOT, PESTLE), company context, named competitors, and structured output format.",
   rules:["Give company context (size, revenue, industry)","Specify an analytical framework","Ask for recommendation + confidence level"],
   example:"\"Using Jobs-to-be-Done framework, analyze why customers churn in month 2. We know: 3-day onboarding, main feature is reporting, competitors have CSV export we don't. List top 3 churn reasons and one fix each.\""
  },
  {id:18,cat:"web",title:"HTML & CSS Prompts",tagline:"Describe layout and design like a designer briefing a developer.",
   weak:"Make a hero section for my website.",
   strong:"Build a hero section in HTML and CSS:\n\nLayout: Full-width, vertically centered, min-height 100vh\nLeft side (60%):\n  - H1: \"Build Faster.\" (64px, weight 800)\n  - Subtitle: one line body text\n  - Two buttons: \"Get Started\" (filled #6366f1) and \"See Demo\" (outlined)\nRight side (40%): image placeholder (400x400, rounded, background #e0e7ff)\n\nDesign:\n  - Background: #0f172a\n  - Text: #f8fafc\n  - CSS Grid layout\n  - Mobile responsive (stack under 768px)\n  - No external libraries",
   why:"Web dev prompts need exact layout structure, dimensions, hex colors, responsive behavior, and tech constraints. Think like writing a design spec.",
   rules:["Give exact colors as hex codes","Specify layout method (Grid, Flexbox)","Define responsive breakpoints"],
   example:"\"Create a CSS card: 320px wide, white background, 16px border-radius, box-shadow, 24px padding. Contains: image (200px, object-fit cover), H3, body text, tag pill (#eff6ff bg, #3b82f6 text). Hover: lift shadow.\""
  },
  {id:19,cat:"web",title:"JavaScript & Interactivity",tagline:"Specify behavior, events, and edge cases precisely.",
   weak:"Add a search bar to my website.",
   strong:"Add live search to this HTML list:\n[paste <ul id=\"product-list\"> with <li> items]\n\nBehavior:\n- Filter in real-time as user types (keyup event)\n- Case-insensitive matching\n- No results: show \"No products found\" message\n- Highlight matching text in yellow\n- Debounce: wait 200ms after user stops typing\n- Clear button (×) appears when input has text\n\nVanilla JS only. No jQuery. Add comments per section.",
   why:"Interactivity prompts must describe: the trigger event, exact behavior, edge cases (no results), performance (debounce), and constraints.",
   rules:["Name the exact event (keyup, click, submit)","Describe edge cases explicitly","Specify vanilla JS vs framework"],
   example:"\"Build a modal in vanilla JS. Opens on button click. Closes on: X button, Escape key, clicking outside. Trap focus inside (accessibility). Fade in/out with CSS transitions.\""
  },
  {id:20,cat:"web",title:"Full Website Strategy",tagline:"Chain prompts to build a complete site step by step.",
   weak:"Build me a website for my business.",
   strong:"Phase 1 — Structure:\n\"HTML skeleton: 5 pages, semantic HTML5, nav with hamburger placeholder.\"\n\nPhase 2 — Design system:\n\"CSS variables: 2 brand colors, 2 fonts, 8px spacing scale, breakpoints at 768px/1024px.\"\n\nPhase 3 — Components:\n\"Build hero section [spec]. Then services grid [spec]. Then contact form [spec].\"\n\nPhase 4 — JavaScript:\n\"Add: smooth scroll, hamburger toggle, form validation, scroll-fade animations.\"\n\nPhase 5 — Polish:\n\"Review for: accessibility (alt, ARIA), performance (lazy loading), SEO (meta, structured data).\"",
   why:"A full website is too complex for one prompt. 5-phase chaining produces clean, maintainable code because each phase has a single clear responsibility.",
   rules:["Structure first, style second, behavior third","One component per prompt in Phase 3","Always end with accessibility + SEO review"],
   example:"Each phase references previous output:\n\"Using the design system from Phase 2 and HTML from Phase 1, build the About page: two-column layout, team photo left, bio text right.\""
  },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  view: "home",         // "home" | "lesson"
  activeCat: "all",
  lessonId: null,
  showStrong: false,
  showWhy: false,
  progress: [],
};

try {
  const saved = JSON.parse(localStorage.getItem("pe_progress") || "[]");
  state.progress = saved;
} catch(e) {}

function saveProgress() {
  try { localStorage.setItem("pe_progress", JSON.stringify(state.progress)); } catch(e) {}
}

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getCat(id) { return CATEGORIES.find(c => c.id === id) || CATEGORIES[0]; }
function getLesson(id) { return LESSONS.find(l => l.id === id); }
function filtered() {
  return state.activeCat === "all" ? LESSONS : LESSONS.filter(l => l.cat === state.activeCat);
}

// ── RENDER HOME ───────────────────────────────────────────────────────────────
function renderHome() {
  const pct = Math.round((state.progress.length / LESSONS.length) * 100);
  const lessons = filtered();

  return `
  <div class="header">
    <div class="header-inner">
      <div class="tag">PROMPT ENGINEERING</div>
      <h1>Master the Art of<br><span class="gradient-text">Prompt Coding</span></h1>
      <p class="subtitle">20 lessons across 8 topics — from basics to web development</p>
      <div class="progress-bar-wrap">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="progress-label">${state.progress.length}/${LESSONS.length}</span>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="filters">
      <button class="filter-btn" onclick="filterCat('all')"
        style="border:1px solid ${state.activeCat==='all'?'#ff6b35':'#1e2035'};color:${state.activeCat==='all'?'#ff6b35':'#5a6080'};background:${state.activeCat==='all'?'#ff6b3522':'transparent'}">
        ALL (${LESSONS.length})
      </button>
      ${CATEGORIES.map(c => {
        const count = LESSONS.filter(l => l.cat === c.id).length;
        const active = state.activeCat === c.id;
        return `<button class="filter-btn" onclick="filterCat('${c.id}')"
          style="border:1px solid ${active?c.color+'88':'#1e2035'};color:${active?c.color:'#5a6080'};background:${active?c.color+'22':'transparent'}">
          ${c.icon} ${c.label} (${count})
        </button>`;
      }).join('')}
    </div>
    <div class="grid">
      ${lessons.map((lesson, i) => {
        const lcat = getCat(lesson.cat);
        const done = state.progress.includes(lesson.id);
        return `
        <div class="card" onclick="openLesson(${lesson.id})"
          style="border-color:${done?lcat.color+'44':'#1a1d2e'};animation-delay:${i*0.03}s"
          onmouseover="this.style.borderColor='${lcat.color}88'"
          onmouseout="this.style.borderColor='${done?lcat.color+'44':'#1a1d2e'}'">
          ${done?`<div class="done-badge">✓</div>`:''}
          <div class="card-cat">
            <span style="color:${lcat.color};font-size:14px">${lcat.icon}</span>
            <span class="card-cat-label" style="color:${lcat.color}">${lcat.label.toUpperCase()}</span>
          </div>
          <div class="card-num">LESSON ${lesson.id}</div>
          <h3>${lesson.title}</h3>
          <p>${lesson.tagline}</p>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── RENDER LESSON ─────────────────────────────────────────────────────────────
function renderLesson() {
  const lesson = getLesson(state.lessonId);
  if (!lesson) return renderHome();
  const lcat = getCat(lesson.cat);
  const done = state.progress.includes(lesson.id);
  const idx = LESSONS.findIndex(l => l.id === lesson.id);
  const hasPrev = idx > 0;
  const hasNext = idx < LESSONS.length - 1;

  return `
  <div class="lesson-topbar">
    <button class="topbar-btn" onclick="goHome()">← Back</button>
    <span class="topbar-cat" style="color:${lcat.color}">${lcat.icon} ${lcat.label.toUpperCase()}</span>
    <button class="done-btn" onclick="toggleDone(${lesson.id})"
      style="background:${done?'#10b981':'transparent'};border:1px solid ${done?'#10b981':'#2a2d45'};color:${done?'#fff':'#a0a8c0'}">
      ${done?'✓ Done':'Mark Done'}
    </button>
  </div>
  <div class="lesson-body fade-up">
    <div class="lesson-meta">LESSON ${lesson.id} OF ${LESSONS.length}</div>
    <div class="lesson-title">${lesson.title}</div>
    <div class="lesson-tagline">${lesson.tagline}</div>

    <div class="prompt-label">
      <span class="prompt-icon" style="color:#ef4444">✗</span>
      <span class="prompt-tag" style="color:#ef4444">WEAK PROMPT</span>
    </div>
    <div class="prompt-box weak-box"><pre>${escHtml(lesson.weak)}</pre></div>

    ${!state.showStrong ? `
      <button class="reveal-btn" onclick="showStrong()"
        style="border:1.5px dashed ${lcat.color}44;color:${lcat.color}">
        Reveal Strong Prompt →
      </button>
    ` : `
      <div class="prompt-label">
        <span class="prompt-icon" style="color:#22c55e">✓</span>
        <span class="prompt-tag" style="color:#22c55e">STRONG PROMPT</span>
      </div>
      <div class="prompt-box strong-box"><pre>${escHtml(lesson.strong)}</pre></div>

      ${!state.showWhy ? `
        <button class="why-btn" onclick="showWhy()">Why does this work? →</button>
      ` : `
        <div class="why-box" style="background:#0c0e1c;border:1px solid ${lcat.color}33;margin-bottom:16px">
          <div class="why-title" style="color:${lcat.color}">WHY IT WORKS</div>
          <p class="why-text">${escHtml(lesson.why)}</p>
          <div class="rules-title">GOLDEN RULES</div>
          <div class="rules-list">
            ${lesson.rules.map((r,i) => `
              <div class="rule-item">
                <span class="rule-num" style="color:${lcat.color}">${i+1}.</span>
                <span class="rule-text">${escHtml(r)}</span>
              </div>`).join('')}
          </div>
        </div>
        <div class="example-box">
          <div class="example-title">REAL-WORLD EXAMPLE</div>
          <pre>${escHtml(lesson.example)}</pre>
        </div>
      `}
    `}

    <div class="nav-btns">
      <button class="nav-btn" onclick="navLesson(-1)" ${!hasPrev?'disabled':''}
        style="background:transparent;border:1px solid ${hasPrev?'#2a2d45':'#1a1d2e'};color:${hasPrev?'#7a80a0':'#2a2d45'};cursor:${hasPrev?'pointer':'not-allowed'}">
        ← Previous
      </button>
      <button class="nav-btn" onclick="navLesson(1)" ${!hasNext?'disabled':''}
        style="background:${hasNext?lcat.color+'22':'transparent'};border:1px solid ${hasNext?lcat.color+'55':'#1a1d2e'};color:${hasNext?lcat.color:'#2a2d45'};cursor:${hasNext?'pointer':'not-allowed'}">
        Next Lesson →
      </button>
    </div>
  </div>`;
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.filterCat = function(cat) { setState({ activeCat: cat }); };
window.openLesson = function(id) { setState({ view:"lesson", lessonId:id, showStrong:false, showWhy:false }); window.scrollTo({top:0,behavior:'smooth'}); };
window.goHome = function() { setState({ view:"home" }); window.scrollTo({top:0,behavior:'smooth'}); };
window.showStrong = function() { setState({ showStrong:true }); };
window.showWhy = function() { setState({ showWhy:true }); };
window.toggleDone = function(id) {
  state.progress = state.progress.includes(id) ? state.progress.filter(x=>x!==id) : [...state.progress, id];
  saveProgress();
  render();
};
window.navLesson = function(dir) {
  const idx = LESSONS.findIndex(l => l.id === state.lessonId);
  const next = LESSONS[idx + dir];
  if (next) window.openLesson(next.id);
};

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = state.view === "home" ? renderHome() : renderLesson();
}

render();
</script>
</body>
</html>
